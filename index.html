<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO | Plataforma Oficial</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0b3c5d, #7ed957);
  color: white;
}

nav {
  display: flex;
  justify-content: space-between;
  padding: 15px 40px;
  background: rgba(0,0,0,0.4);
}

nav ul {
  display: flex;
  gap: 20px;
  list-style: none;
}

nav a, nav button {
  color: white;
  background: none;
  border: none;
  cursor: pointer;
  font-weight: bold;
}

.section {
  padding: 60px 20px;
  text-align: center;
}

.hero {
  padding: 100px 20px;
}

.btn {
  background: #7ed957;
  color: black;
  padding: 12px 25px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  font-weight: bold;
  margin-top: 10px;
}

.product-img {
  width: 220px;
  border-radius: 15px;
  margin: 20px;
}

.cart {
  background: rgba(0,0,0,0.3);
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}
</style>
</head>

<body>

<nav>
  <h2>NEXO</h2>
  <ul>
    <li><a href="#inicio">Inicio</a></li>
    <li><a href="#producto">Producto</a></li>
    <li><a href="#contacto">Contacto</a></li>
    <li><button onclick="loginGoogle()">Login</button></li>
  </ul>
</nav>

<section id="inicio" class="hero section">
  <h1>NEXO</h1>
  <p>Tu espacio de calma, siempre contigo</p>
  <button class="btn" onclick="loginGoogle()">Iniciar con Google</button>
  <p id="user"></p>
</section>

<section id="producto" class="section">
  <h2>Producto</h2>

  <img src="https://i.postimg.cc/0Q0zZxYw/nexo.jpg" class="product-img">

  <p>Dispositivo portátil para reducir el estrés mediante pulsos relajantes.</p>

  <h3>Compra</h3>

  <select id="cantidad" onchange="updateTotal()">
    <option value="1">1</option>
    <option value="2">2</option>
  </select>

  <p>Total: $<span id="total">250</span> MXN</p>

  <button class="btn" onclick="comprar()">Comprar</button>

  <div class="cart">
    <p>Usuario: <span id="userCart">No conectado</span></p>
  </div>

  <p>📦 Bajo pedido | 🚚 Entrega 5-6 días</p>
</section>

<section id="contacto" class="section">
  <h2>Contacto</h2>
  <p>📞 231-151-48135</p>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// 🔥 TU CONFIG YA PUESTA
const firebaseConfig = {
  apiKey: "AIzaSyBcZD6ayN9cdYOgc6bpTLpj_dhN0oc5OjI",
  authDomain: "nexo-1d9c2.firebaseapp.com",
  projectId: "nexo-1d9c2",
  storageBucket: "nexo-1d9c2.firebasestorage.app",
  messagingSenderId: "524854384171",
  appId: "1:524854384171:web:7581111dc7c080ad4c7c6e",
  measurementId: "G-5W1FT1QWEL"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

let usuario = null;
let precio = 250;

// LOGIN REAL
window.loginGoogle = async function() {
  try {
    const result = await signInWithPopup(auth, provider);
    usuario = result.user;

    document.getElementById("user").innerText = "Sesión: " + usuario.email;
    document.getElementById("userCart").innerText = usuario.email;

  } catch (error) {
    alert("Error al iniciar sesión");
    console.error(error);
  }
}

// TOTAL
window.updateTotal = function() {
  let cant = document.getElementById("cantidad").value;
  document.getElementById("total").innerText = cant * precio;
}

// COMPRA
window.comprar = function() {
  if (!usuario) {
    alert("Debes iniciar sesión");
    return;
  }

  let cant = document.getElementById("cantidad").value;
  let total = cant * precio;

  let mensaje = Hola, soy ${usuario.email} y quiero ${cant} NEXO(s) por $${total};
  window.open(https://wa.me/5223115148135?text=${encodeURIComponent(mensaje)});
}

</script>

</body>
