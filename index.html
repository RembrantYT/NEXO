<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXO | MAX</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(135deg,#0b3c5d,#7ed957);
  color:white;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  backdrop-filter:blur(10px);
}

/* HERO */
.hero{
  text-align:center;
  padding:100px 20px;
}

/* BOTONES */
.btn{
  background:#7ed957;
  border:none;
  padding:10px 20px;
  border-radius:20px;
  cursor:pointer;
}

/* PRODUCTO */
.product{
  text-align:center;
  padding:40px;
}

.product img{
  width:200px;
  border-radius:15px;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.7);
  display:none;
  justify-content:center;
  align-items:center;
}

.modal-box{
  background:white;
  color:black;
  padding:20px;
  border-radius:10px;
  width:300px;
}

/* ADMIN */
.admin{
  display:none;
  background:rgba(0,0,0,.3);
  padding:20px;
  margin:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<nav>
<h2>NEXO</h2>
<button class="btn" onclick="login()">Login</button>
</nav>

<section class="hero">
<h1>NEXO</h1>
<p id="user">No conectado</p>
</section>

<section class="product">
<h2>Producto</h2>
<img src="https://i.postimg.cc/0Q0zZxYw/nexo.jpg">

<p>Stock: <span id="stock">...</span></p>

<select id="cantidad">
<option value="1">1</option>
<option value="2">2</option>
</select>

<button class="btn" onclick="abrirPago()">Comprar</button>

<p>Carrito: <span id="cart">0</span></p>
</section>

<!-- MODAL PAGO -->
<div class="modal" id="modal">
<div class="modal-box">
<h3>Pago</h3>
<input placeholder="Nombre tarjeta"><br><br>
<input placeholder="** ** ** 4242"><br><br>
<button class="btn" onclick="confirmarCompra()">Pagar</button>
</div>
</div>

<section class="admin" id="admin">
<h2>Pedidos</h2>
<div id="pedidos"></div>
</section>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, collection, getDocs, updateDoc as upd } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBcZD6...",
  authDomain: "nexo-1d9c2.firebaseapp.com",
  projectId: "nexo-1d9c2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user=null;
let cart=0;

// LOGIN
window.login = async ()=>{
  let res = await signInWithPopup(auth,provider);
  user = res.user;
  document.getElementById("user").innerText = user.email;

  document.getElementById("admin").style.display="block";
  loadPedidos();
}

// STOCK
async function stock(){
  let ref = doc(db,"data","stock");
  let snap = await getDoc(ref);

  if(!snap.exists()){
    await setDoc(ref,{cantidad:4});
    document.getElementById("stock").innerText=4;
  }else{
    document.getElementById("stock").innerText=snap.data().cantidad;
  }
}
stock();

// MODAL
window.abrirPago=()=>{
  document.getElementById("modal").style.display="flex";
}

// CONFIRMAR
window.confirmarCompra = async ()=>{
  let cant = parseInt(document.getElementById("cantidad").value);

  let ref = doc(db,"data","stock");
  let snap = await getDoc(ref);
  let s = snap.data().cantidad;

  if(cant > s) return alert("Sin stock");

  await updateDoc(ref,{cantidad:s-cant});

  await setDoc(doc(db,"pedidos",Date.now().toString()),{
    user:user.email,
    cantidad:cant,
    estado:"pendiente"
  });

  cart+=cant;
  document.getElementById("cart").innerText=cart;

  document.getElementById("modal").style.display="none";
  alert("Pago simulado exitoso");
}

// ADMIN
async function loadPedidos(){
  let q = await getDocs(collection(db,"pedidos"));
  let html="";

  q.forEach(d=>{
    let data = d.data();
    html+=`
    <p>${data.user} - ${data.cantidad} 
    <button onclick="cambiar('${d.id}')">✔</button></p>`;
  });

  document.getElementById("pedidos").innerHTML=html;
}

window.cambiar = async (id)=>{
  let ref = doc(db,"pedidos",id);
  await upd(ref,{estado:"enviado"});
  loadPedidos();
}

</script>

</body>
</html>
